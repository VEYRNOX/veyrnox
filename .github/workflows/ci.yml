name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      # The lockfile is authored with npm 11; Node 22 ships npm 10, which rejects
      # it (optional native dep resolution). Pin npm 11 to match the toolchain.
      - run: npm install -g npm@11
      - run: npm ci
      # Supply-chain gate: fail CI on any NEW critical advisory. Known/deferred
      # criticals are allowlisted with a reason in scripts/audit-gate.mjs;
      # highs/moderates are triaged for reachability in docs/SAST_FINDINGS.md.
      - run: node scripts/audit-gate.mjs
      - run: npm run lint
      # Whole-tree type gate. `pretest` only runs typecheck:core (the fast,
      # security-critical wallet-core slice); CI additionally holds the ENTIRE
      # tree at zero checkJs errors so UI-layer types can't silently drift.
      - run: npm run typecheck
      # F5: run the CSPRNG guard as a dedicated required step, not only
      # transitively via the test `pretest` hook (so it can't silently drop if
      # the test script changes).
      - run: npm run check:rng
      - run: npm run build
      - run: npm test

  android-release:
    runs-on: ubuntu-latest
    # Only build the release APK on main-branch pushes (not every PR).
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: verify
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
      - name: Sync Capacitor
        run: npx cap sync android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build release APK
        run: ./gradlew assembleRelease -PRELEASE_CERT_SHA256="${{ secrets.RELEASE_CERT_SHA256 }}"
        working-directory: android
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: veyrnox-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
