name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # The lockfile is authored with npm 11; Node 22 ships npm 10, which rejects
      # it (optional native dep resolution). Pin npm 11 to match the toolchain.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      # Whole-tree type gate. `pretest` only runs typecheck:core (the fast,
      # security-critical wallet-core slice); CI additionally holds the ENTIRE
      # tree at zero checkJs errors so UI-layer types can't silently drift.
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
