name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# WalletConnect (Reown) project ID — a PUBLIC client identifier (it ships in the
# bundle; not a secret), stored as a repo Actions variable. Injected here at the
# workflow level so every `npm run build` (verify + android-release) bakes it in,
# otherwise CI / release APKs ship with the dApp Connector "Project ID required".
env:
  VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      # The lockfile is authored with npm 11; Node 22 ships npm 10, which rejects
      # it (optional native dep resolution). Pin npm 11 to match the toolchain.
      - run: npm install -g npm@11
      - run: npm ci
      # Supply-chain gate: fail CI on any NEW critical advisory. Known/deferred
      # criticals are allowlisted with a reason in scripts/audit-gate.mjs;
      # highs/moderates are triaged for reachability in docs/SAST_FINDINGS.md.
      - run: node scripts/audit-gate.mjs
      - run: npm run lint
      # Whole-tree type gate. `pretest` only runs typecheck:core (the fast,
      # security-critical wallet-core slice); CI additionally holds the ENTIRE
      # tree at zero checkJs errors so UI-layer types can't silently drift.
      - run: npm run typecheck
      # F5: run the CSPRNG guard as a dedicated required step, not only
      # transitively via the test `pretest` hook (so it can't silently drop if
      # the test script changes).
      - run: npm run check:rng
      - run: npm run build
      - run: npm test

  android-release:
    runs-on: ubuntu-latest
    # Only build the release APK on main-branch pushes (not every PR).
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: verify
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
      - name: Sync Capacitor
        run: npx cap sync android
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Decode keystore
        # KEYSTORE_BASE64: base64-encoded .jks file stored as a GitHub secret.
        # If absent the build falls back to debug signing (unsigned release not installable).
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks
            echo "KEYSTORE_PATH=$PWD/android/keystore.jks" >> $GITHUB_ENV
          fi
      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -PRELEASE_CERT_SHA256="${{ secrets.RELEASE_CERT_SHA256 }}"
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: veyrnox-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
