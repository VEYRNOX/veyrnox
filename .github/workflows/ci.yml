name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# WalletConnect (Reown) project ID — a PUBLIC client identifier (it ships in the
# bundle; not a secret), stored as a repo Actions variable. Injected here at the
# workflow level so every `npm run build` (verify + android-release) bakes it in,
# otherwise CI / release APKs ship with the dApp Connector "Project ID required".
env:
  VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}

jobs:
  # Diff-based mainnet activation flag change gate (Critical Blocker #3,
  # Option A). Mainnet is already live and audited (2026-06-17) — this job
  # does NOT gate "is mainnet on", it gates "did this PR CHANGE a mainnet
  # activation flag". See docs/MAINNET_GATE_DESIGN.md and
  # docs/MAINNET_ACTIVATION.md.
  #
  # PROCEDURAL, not cryptographic: this job labels + comments so a human sees
  # it before merge. It does NOT fail the build and does NOT block merge by
  # itself — branch protection / required-reviewer policy is what actually
  # gates the merge, same as any other PR review.
  mainnet-flag-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so `git diff <base>...HEAD` can find the merge-base;
          # a shallow checkout would make every PR look like it changed
          # everything (or fail the diff outright).
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Detect mainnet flag changes
        id: detect
        run: |
          node scripts/detect-mainnet-flag-changes.js --base "origin/${{ github.base_ref }}" > mainnet-flag-report.json
          cat mainnet-flag-report.json
          HAS_CHANGES=$(node -e "console.log(JSON.parse(require('fs').readFileSync('mainnet-flag-report.json','utf8')).hasMainnetChanges)")
          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
      - name: Label + comment on flagged PR
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('mainnet-flag-report.json', 'utf8'));
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            await github.rest.issues.addLabels({
              owner, repo, issue_number,
              labels: ['mainnet-gate-required'],
            });

            const changeList = report.changes
              .map(c => `- \`${c.flag}\` in \`${c.file}:${c.lineNumber}\` — \`${c.oldValue}\` → \`${c.newValue}\``)
              .join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: [
                '⚠️ This PR modifies mainnet activation flags. This requires explicit review by the wallet owner before merge.',
                '',
                changeList,
                '',
                'See `docs/MAINNET_ACTIVATION.md` for the activation process and `docs/MAINNET_GATE_DESIGN.md` for why this is a procedural (not automatic-block) gate.',
              ].join('\n'),
            });

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      # The lockfile is authored with npm 11; Node 22 ships npm 10, which rejects
      # it (optional native dep resolution). Pin npm 11 to match the toolchain.
      - run: npm install -g npm@11
      - run: npm install --legacy-peer-deps
      # LOG-1 gate (independent-audit F4.1): assert the debug-bridge log-redaction
      # patch actually applied to node_modules. A patch-package patch is silently
      # dropped when @capacitor/{android,ios} is bumped past the pinned 8.4.1, which
      # would re-open the hardware-KEK-H / vault-blob logcat leak with no build error.
      # Dedicated required step (same rationale as check:rng / check:strays below).
      - run: npm run check:log-redaction
      # RASP B4 — Android release-build hygiene gate. Asserts that the release
      # buildType in build.gradle retains the hardening properties that can silently
      # regress via merge conflicts or cap-sync rewrites: setWebContentsDebuggingEnabled
      # (gated on !BuildConfig.DEBUG), FLAG_SECURE, minifyEnabled true,
      # shrinkResources true, debuggable false, proguardFiles referenced.
      - run: npm run check:release-hygiene
      # Supply-chain gate: fail CI on any NEW critical advisory. Known/deferred
      # criticals are allowlisted with a reason in scripts/audit-gate.mjs;
      # highs/moderates are triaged for reachability in docs/SAST_FINDINGS.md.
      - run: node scripts/audit-gate.mjs
      - run: npm run lint
      # Critical Blocker #1 — R0/R1 crypto-core ring-boundary gate as a
      # DEDICATED required step (not only transitively via `npm run lint`), so it
      # can't silently drop if the lint script's scope changes — same pattern as
      # check:rng below. Fails CI (blocks merge) if any UI/backend-layer file
      # imports a key-touching crypto-core module (keystore / vault / mnemonic /
      # derivation / coldkey, or the @vault/@signing/@keys aliases). The four
      # known pre-existing crossings are an explicit labelled baseline in
      # eslint.config.js; anything NEW fails here.
      - run: npm run lint:rings
      # Whole-tree type gate. `pretest` only runs typecheck:core (the fast,
      # security-critical wallet-core slice); CI additionally holds the ENTIRE
      # tree at zero checkJs errors so UI-layer types can't silently drift.
      - run: npm run typecheck
      # F5: run the CSPRNG guard as a dedicated required step, not only
      # transitively via the test `pretest` hook (so it can't silently drop if
      # the test script changes).
      - run: npm run check:rng
      # Stray-artifact gate: fail if the index contains zero-byte files or
      # shell-fragment filenames (accidental redirection artifacts — three
      # reached main before this gate existed: `per-page`, `false))`, `!(r.topic`).
      - run: npm run check:strays
      # Brief A — deniability-string scanner: fails on new wallet/set-count
      # string leaks in rendered copy (D1-D3) or raw-seed clipboard writes.
      # Dedicated required step, same rationale as check:rng above.
      - run: npm run check:deniability-strings
      # Finding-ID drift gate: fails if a user-facing surface (the feature
      # catalogue) describes a RESOLVED audit finding as still open, or if the
      # findings registry cites a source doc that does not mention the ID. This
      # is the tripwire for the 2026-07-06 C-1 mislabel; see docs/findings-registry.json.
      - run: npm run check:finding-ids
      # P2-10 (audit 2026-07-15): stop a future contributor from silently wiring
      # the dormant CertPinManager.kt into an active OkHttp construction path
      # while its PINNED_HOSTS map still carries PLACEHOLDER_ SPKI pins (that
      # combination would make OkHttp refuse every pinned host at connect time
      # — availability regression). Static grep, no runtime.
      - run: npm run check:cert-pin-manager
      # #1107: fail CI if any .env.production* file sets VITE_BYPASS_RASP=1 --
      # that disables the entire RASP pre-sign integrity gate.
      - run: npm run check:rasp-bypass
      # iOS SPM manifest gate: `npx cap sync` run on Windows rewrites
      # ios/App/CapApp-SPM/Package.swift with backslash paths. Backslash is
      # Swift's escape character, so the manifest stops parsing — but ONLY on
      # macOS, and no CI job compiles it. This repo is developed on Windows
      # while the iOS build needs a Mac, so without this gate the breakage is
      # invisible until someone opens the project there (observed 2026-07-22).
      - run: npm run check:spm-paths
      - run: npm run build

  # Unit tests run in their OWN job, deliberately NOT inside `verify`.
  #
  # WHY: steps in a job are fail-fast, so when `verify` ran the suite as its last
  # step, ANY earlier gate failing (lint, typecheck, a policy check) aborted the job
  # before `npm test` executed — and the entire 3.7k-test result silently vanished.
  # A red `verify` could not be distinguished from "tests never ran".
  #
  # That is exactly how #1236 landed: it failed `npm run typecheck`, so the two unit
  # tests it broke never reported, it was merged with `verify` red, and main stayed
  # red on unit tests undetected until #1267 fixed them a day later.
  #
  # Keeping this separate means lint/typecheck and the test suite give INDEPENDENT
  # signal, neither can mask the other, and they run in parallel. Require BOTH in
  # branch protection.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      # Lockfile is authored with npm 11; Node 22 ships npm 10, which rejects it.
      - run: npm install -g npm@11
      - run: npm install --legacy-peer-deps
      - run: npm test

  android-unit-tests:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install JS deps and sync Capacitor Android
        run: |
          npm install -g npm@11
          npm install --legacy-peer-deps
          mkdir -p dist && echo '<html></html>' > dist/index.html
          npx cap sync android
      - name: Run Android JVM unit tests (ES256 DER transcoder + RASP)
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --info
        working-directory: android

  android-release:
    runs-on: ubuntu-latest
    # Only build the release APK on main-branch pushes (not every PR).
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: verify
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@11
      - run: npm install --legacy-peer-deps
      - run: npm run build
      - name: Sync Capacitor
        run: npx cap sync android
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          # Capacitor 8 / the Android Gradle build target Java 21; JDK 17 fails the
          # release build with "invalid source release: 21". (Local APK builds use 21.)
          java-version: 21
      - name: Decode keystore
        # KEYSTORE_BASE64: base64-encoded .jks file stored as a GitHub secret.
        # If absent the build falls back to debug signing (unsigned release not installable).
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks
            echo "KEYSTORE_PATH=$PWD/android/keystore.jks" >> $GITHUB_ENV
          fi
      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -PRELEASE_CERT_SHA256="${{ secrets.RELEASE_CERT_SHA256 }}"
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
      # Play uploads take an AAB, never an APK. Without this step the pipeline
      # produced only a sideloadable APK, so every Play upload had to be built
      # by hand on a developer machine with the keystore — the exact manual
      # signing path that cost this project its upload key once already.
      #
      # A sideloaded APK also cannot verify Play Billing: Play only serves
      # billing to a build installed FROM a track. So the APK proves the app
      # runs; only this AAB can prove a purchase works.
      - name: Build release AAB (Play upload artifact)
        run: ./gradlew bundleRelease -PRELEASE_CERT_SHA256="${{ secrets.RELEASE_CERT_SHA256 }}"
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
      # Regression gate for the release-cert guard in android/app/build.gradle.
      # PR #1310 added a debug-fingerprint check; PR #1313 rewrote the guard and
      # silently dropped it, and nothing caught that for ten days because no test
      # ever asserted the guard REJECTS anything. This asserts the rejections.
      # Runs after the real build, so Gradle is warm — each case costs seconds.
      - name: Release-cert guard must reject wrong fingerprints
        run: |
          set -u
          # No keystore secret (forks) means the build above was debug-signed and
          # there is no upload cert to test against — skip rather than fail.
          if [ ! -f keystore.jks ]; then
            echo "no release keystore — guard regression test skipped"
            exit 0
          fi
          expect_rejected() {
            label="$1"; shift
            if ./gradlew assembleRelease "$@" >/tmp/guard.log 2>&1; then
              echo "::error::release guard did NOT reject $label — a broken AAB could ship"
              exit 1
            fi
            if ! grep -q 'RELEASE_CERT_SHA256' /tmp/guard.log; then
              echo "::error::build failed for an unrelated reason while testing $label"
              tail -30 /tmp/guard.log
              exit 1
            fi
            echo "OK — rejected $label"
          }
          expect_rejected "a blank fingerprint"     -PRELEASE_CERT_SHA256=
          expect_rejected "a malformed fingerprint" -PRELEASE_CERT_SHA256=deadbeef
          # The upload cert is the likeliest wrong value: it IS the key that just
          # signed the artifact, so it looks correct. Derived here rather than
          # hardcoded, so a key rotation cannot make this test stale.
          UPLOAD_SHA=$(keytool -list -v -keystore keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" \
            | grep 'SHA256:' | head -1 | awk '{print $2}')
          if [ -n "$UPLOAD_SHA" ]; then
            expect_rejected "the upload cert" -PRELEASE_CERT_SHA256="$UPLOAD_SHA"
          else
            echo "::warning::could not read the upload cert fingerprint — upload-cert case skipped"
          fi
          # Restore the good artifact the next step uploads.
          ./gradlew assembleRelease -PRELEASE_CERT_SHA256="${{ secrets.RELEASE_CERT_SHA256 }}"
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: veyrnox-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      # The Play upload artifact. Download this, upload to the internal track,
      # then install FROM Play — that is the only path on which Play Billing
      # (and therefore the referral / retention offers) can be exercised.
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: veyrnox-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
      # Surfaces the versionCode actually built, so it can be checked against
      # what Play has already consumed BEFORE attempting an upload. Play rejects
      # a duplicate versionCode outright, and that is a slow thing to discover
      # at the end of an upload.
      - name: Report built versionCode
        run: |
          VC=$(grep -m1 'versionCode' app/build.gradle | tr -dc '0-9')
          echo "Built versionCode: ${VC}"
          echo "### Android release artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- versionCode: \`${VC}\` — must exceed every versionCode already uploaded to Play" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`veyrnox-release-aab\` → Play internal track (required for Play Billing)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`veyrnox-release-apk\` → sideload smoke test only (Play Billing will NOT work)" >> "$GITHUB_STEP_SUMMARY"
        working-directory: android
