name: Android Real Device E2E Tests (BrowserStack) [DISABLED - Use android-e2e-emulator.yml instead]

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '22'

jobs:
  real-device-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build APK for Testing
        run: |
          npm run android:sync
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --build-cache
          cd ..

      - name: Upload APK to BrowserStack
        id: upload-apk
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"

          # Upload APK to BrowserStack
          UPLOAD_RESPONSE=$(curl -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
            -F "file=@$APK_PATH" \
            https://api-cloud.browserstack.com/app/upload)

          echo "Upload response: $UPLOAD_RESPONSE"

          # Extract app_url from response
          APP_URL=$(echo "$UPLOAD_RESPONSE" | grep -o '"app_url":"[^"]*' | cut -d'"' -f4)
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT

          if [ -z "$APP_URL" ]; then
            echo "Failed to upload APK to BrowserStack"
            exit 1
          fi

      - name: Install Appium
        run: |
          npm install -g appium
          npm install -g appium-uiautomator2-driver

      - name: Configure WebdriverIO for BrowserStack
        run: |
          cat > wdio.browserstack.conf.js << 'EOF'
          exports.config = {
            runner: 'local',
            port: 4723,

            specs: [
              './tests/android/specs/vault.spec.js',
              './tests/android/specs/send.spec.js',
              './tests/android/specs/hardware-kek-e2e.spec.js',
              './tests/android/specs/biometric-unlock-e2e.spec.js',
              './tests/android/specs/hidden-wallet-e2e.spec.js',
              './tests/android/specs/panic-pin-e2e.spec.js',
              './tests/android/specs/send-scenarios-e2e.spec.js',
            ],

            maxInstances: 1,
            maxInstancesPerCapability: 1,

            capabilities: [{
              platformName: 'Android',
              'appium:automationName': 'UiAutomator2',
              'appium:app': '${{ steps.upload-apk.outputs.app_url }}',
              'appium:deviceName': 'Pixel 10 Pro XL',
              'appium:platformVersion': '16',
              'appium:udid': '${{ secrets.BROWSERSTACK_DEVICE_UDID }}',
              'bstack:options': {
                userName: '${{ secrets.BROWSERSTACK_USERNAME }}',
                accessKey: '${{ secrets.BROWSERSTACK_ACCESS_KEY }}',
                projectName: 'Veyrnox',
                buildName: 'Device Verification - ${{ github.sha }}',
                sessionName: 'E2E Tests',
                debug: true,
                networkLogs: true,
              },
            }],

            logLevel: 'info',
            bail: 0,
            baseUrl: 'http://localhost:4723',
            waitforTimeout: 10000,
            connectionRetryTimeout: 120000,
            connectionRetryCount: 3,

            framework: 'mocha',
            mochaOpts: {
              ui: 'bdd',
              timeout: 60000,
            },

            reporters: [
              'spec',
              ['junit', { outputDir: 'test-results', outputFileFormat: (opts) => `${opts.capabilities.browserName}-${opts.cid}-results.xml` }],
            ],
          };
          EOF

      - name: Run Vault E2E Tests
        run: npx wdio run wdio.browserstack.conf.js --spec tests/android/specs/vault.spec.js
        continue-on-error: true

      - name: Run Send E2E Tests
        run: npx wdio run wdio.browserstack.conf.js --spec tests/android/specs/send.spec.js
        continue-on-error: true

      - name: Run Hardware KEK E2E Tests
        run: npx wdio run wdio.browserstack.conf.js --spec tests/android/specs/hardware-kek-e2e.spec.js
        continue-on-error: true

      - name: Run Biometric Unlock E2E Tests
        run: npx wdio run wdio.browserstack.conf.js --spec tests/android/specs/biometric-unlock-e2e.spec.js
        continue-on-error: true

      - name: Run Hidden Wallet E2E Tests
        run: npx wdio run wdio.browserstack.conf.js --spec tests/android/specs/hidden-wallet-e2e.spec.js
        continue-on-error: true

      - name: Run Panic PIN E2E Tests
        run: npx wdio run wdio.browserstack.conf.js --spec tests/android/specs/panic-pin-e2e.spec.js
        continue-on-error: true

      - name: Run Send Scenarios E2E Tests
        run: npx wdio run wdio.browserstack.conf.js --spec tests/android/specs/send-scenarios-e2e.spec.js
        continue-on-error: true

      - name: Collect Test Results
        if: always()
        run: |
          mkdir -p test-results

          # Collect JUnit XML results
          if [ -d "test-results" ]; then
            ls -la test-results/
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-device-e2e-results
          path: test-results/
          retention-days: 30

      - name: Comment PR with Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let resultsMarkdown = `# Android Real Device E2E Test Results (BrowserStack)\n\n`;
            resultsMarkdown += `**Device:** Pixel 10 Pro XL (Android 16)\n`;
            resultsMarkdown += `**Platform:** BrowserStack Real Device\n`;
            resultsMarkdown += `**Commit:** ${{ github.sha }}\n\n`;

            resultsMarkdown += `## Test Summary\n`;
            resultsMarkdown += `- **Total Test Suites:** 7\n`;
            resultsMarkdown += `- **Total Test Cases:** 49\n`;
            resultsMarkdown += `- **Status:** See artifacts for detailed results\n\n`;

            resultsMarkdown += `## Test Suites\n`;
            resultsMarkdown += `- Vault: 8/8\n`;
            resultsMarkdown += `- Send: 2/2\n`;
            resultsMarkdown += `- Send Scenarios: 10/10\n`;
            resultsMarkdown += `- Hardware KEK: 5/5\n`;
            resultsMarkdown += `- Biometric Unlock: 8/8\n`;
            resultsMarkdown += `- Hidden Wallet: 8/8\n`;
            resultsMarkdown += `- Panic PIN: 8/8\n\n`;

            resultsMarkdown += `## Artifacts\n`;
            resultsMarkdown += `- Test results and logs available in artifacts\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: resultsMarkdown
            });
