name: Update audit snapshot

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Mirror the verify job's install convention (ci.yml): the lockfile is
      # generated by npm 11 under --legacy-peer-deps, so a plain `npm ci` on
      # the runner's stock npm 10 fails with a phantom "Missing:
      # utf-8-validate@5" peer-tree desync.
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install -g npm@11
      - run: npm install --legacy-peer-deps
      - run: node scripts/gen-audit-snapshot.mjs
      - name: Commit updated snapshot (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet public/audit-snapshot.json || (git add public/audit-snapshot.json && git commit -m "chore(ci): update npm audit snapshot")
          git push
