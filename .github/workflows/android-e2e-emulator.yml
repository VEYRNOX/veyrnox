name: Android E2E Emulator Tests

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Capacitor 8 / the Android Gradle build target Java 21; JDK 17 fails with
  # "invalid source release: 21" (same pin as ci.yml android-release).
  JAVA_VERSION: '21'
  # Capacitor CLI requires Node >= 22.
  NODE_VERSION: '22'
  GRADLE_OPTS: '-Xmx6g -Dorg.gradle.daemon=false'
  # Public client identifier baked into `npm run build` (see ci.yml).
  VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}

jobs:
  e2e-emulator-tests:
    # ubuntu-latest runners expose KVM, so the emulator is hardware-accelerated.
    # (Previously macos-13, which GitHub retired — jobs queued forever.)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      matrix:
        api-level: [31]  # Android 12 (reasonable minimum, faster emulation)
        target: [google_apis]  # Google Play APIs (needed for some system services)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install dependencies
        run: npm ci

      # Build the APK before booting the emulator so emulator uptime is spent
      # only on tests.
      - name: Build debug APK
        run: |
          npm run android:sync
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --build-cache

      - name: Install Appium + UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run E2E suites on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: pixel_5
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash .github/scripts/android-e2e-emulator.sh

      - name: Report per-suite results
        if: always()
        run: |
          echo "## Android E2E (emulator, API ${{ matrix.api-level }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f test-results/suite-results.txt ]; then
            sed 's/^/- /' test-results/suite-results.txt >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_hardware-kek and biometric-unlock require real hardware (StrongBox / enrolled biometrics) and are expected to fail on an emulator. Suites are non-blocking; this job fails only on infrastructure errors (build, emulator boot, Appium)._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**No suites ran — infrastructure failure before test execution.**" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-results-api${{ matrix.api-level }}
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

  web-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Web Deniability E2E Tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:5173
        # Step-level timeout so a hung/slow suite trips continue-on-error
        # instead of the job-level timeout, which cancels the whole job and
        # defeats the non-blocking design (observed: suite ran 28 min, job
        # killed at 30).
        timeout-minutes: 20
        continue-on-error: true

      - name: Upload Web Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-results
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

  test-matrix-summary:
    runs-on: ubuntu-latest
    needs: [e2e-emulator-tests, web-e2e-tests]
    if: always()

    steps:
      # Honest aggregation only: real job statuses, no hardcoded test counts.
      # Per-suite pass/fail detail lives in the e2e-emulator-tests step summary
      # and the uploaded artifacts.
      - name: Check Test Status
        run: |
          echo "## E2E Test Matrix Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Android Emulator Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ needs.e2e-emulator-tests.result }} (per-suite results in that job's summary/artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Web E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ needs.web-e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
