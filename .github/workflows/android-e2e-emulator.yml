name: Android E2E Emulator Tests

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Capacitor 8 / the Android Gradle build target Java 21; JDK 17 fails with
  # "invalid source release: 21" (same pin as ci.yml android-release).
  JAVA_VERSION: '21'
  # Capacitor CLI requires Node >= 22.
  NODE_VERSION: '22'
  GRADLE_OPTS: '-Xmx6g -Dorg.gradle.daemon=false'
  # Public client identifier baked into `npm run build` (see ci.yml).
  VITE_WALLETCONNECT_PROJECT_ID: ${{ vars.VITE_WALLETCONNECT_PROJECT_ID }}

jobs:
  e2e-emulator-tests:
    # ubuntu-latest runners expose KVM, so the emulator is hardware-accelerated.
    # (Previously macos-13, which GitHub retired — jobs queued forever.)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      matrix:
        api-level: [31]  # Android 12 (reasonable minimum, faster emulation)
        target: [google_apis]  # Google Play APIs (needed for some system services)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Build the APK before booting the emulator so emulator uptime is spent
      # only on tests.
      - name: Build debug APK
        run: |
          npm run android:sync
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --build-cache

      - name: Install Appium + UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run E2E suites on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: pixel_5
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash .github/scripts/android-e2e-emulator.sh

      - name: Report per-suite results
        if: always()
        run: |
          echo "## Android E2E (emulator, API ${{ matrix.api-level }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f test-results/suite-results.txt ]; then
            sed 's/^/- /' test-results/suite-results.txt >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_hardware-kek and biometric-unlock require real hardware (StrongBox / enrolled biometrics) and are expected to fail on an emulator. Suites are non-blocking; this job fails only on infrastructure errors (build, emulator boot, Appium)._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**No suites ran — infrastructure failure before test execution.**" >> "$GITHUB_STEP_SUMMARY"
          fi

      # 2026-07-05: the Capacitor debug bridge logger echoed native plugin results
      # (hardware KEK factor H, encrypted vault blob) to the WebView console, which
      # debug builds relay to logcat — and this job persisted logcat into artifacts.
      # The bridge logger is now redacted at source via
      # patches/@capacitor+android+8.4.1.patch; this step is a second, independent
      # layer so secrets can never persist in CI artifacts even if that patch is
      # bypassed or an app-level console.log leaks.
      - name: Scrub sensitive payloads from test artifacts
        if: always()
        run: |
          # 1) Redact any JSON "h":"<base64>" value (hardware KEK factor H) in every
          #    collected file — payloads can also transit appium.log via the
          #    WebDriver getLog('logcat') responses. Handles quotes escaped inside
          #    JSON strings (\"h\":\"...\") too.
          find test-results -type f -print0 | while IFS= read -r -d '' f; do
            sed -E -i 's@[\\]?"h[\\]?"[[:space:]]*:[[:space:]]*[\\]?"[A-Za-z0-9+/=]{16,}[\\]?"@"h":"[REDACTED-H]"@g' "$f" 2>/dev/null || true
          done
          # 2) Drop the entire WebView-console relay class from the logcat capture.
          #    Bridge result payload lines carry NO plugin name (the pluginId header
          #    line is filtered by Capacitor's isValidMsg), so name-based filtering
          #    cannot catch them — dropping all Capacitor/Console lines is the only
          #    reliable scrub. Native evidence lines (tag "HardwareKek", e.g.
          #    "salt-source: ...") are not Console-tagged and are preserved.
          if [ -f test-results/logcat.log ]; then
            grep -v 'Capacitor/Console' test-results/logcat.log > test-results/logcat.scrubbed.log || true
            mv test-results/logcat.scrubbed.log test-results/logcat.log
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-results-api${{ matrix.api-level }}
          path: test-results/
          # Reduced from 30 -> 7 days (2026-07-05): these artifacts contain device
          # logcat; keep the exposure window short even though payloads are scrubbed.
          retention-days: 7
          if-no-files-found: ignore

  web-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Honest pass/fail: no continue-on-error — a red suite fails the job.
      # Supervised harnesses (harness B human-in-the-loop, WebAuthn tier-2 UAT) are
      # excluded via testIgnore in playwright.config.ts; they blocked on human input
      # until the job timeout (run 28734031084). The step timeout is containment only.
      - name: Run Web Deniability E2E Tests
        run: npm run test:e2e
        timeout-minutes: 20
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:5173

      - name: Upload Web Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-e2e-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30
          if-no-files-found: ignore

  test-matrix-summary:
    runs-on: ubuntu-latest
    needs: [e2e-emulator-tests, web-e2e-tests]
    if: always()

    steps:
      # Honest aggregation only: real job statuses, no hardcoded test counts.
      # Per-suite pass/fail detail lives in the e2e-emulator-tests step summary
      # and the uploaded artifacts.
      - name: Check Test Status
        run: |
          echo "## E2E Test Matrix Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Android Emulator Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ needs.e2e-emulator-tests.result }} (per-suite results in that job's summary/artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Web E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Job status: ${{ needs.web-e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: Chromium (see playwright.config.ts projects)" >> $GITHUB_STEP_SUMMARY
          echo "- Supervised harnesses (harness B, WebAuthn tier-2) excluded — run manually with RUN_SUPERVISED_E2E=1" >> $GITHUB_STEP_SUMMARY
