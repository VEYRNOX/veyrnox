<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/veyrnox-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050608" />
    <link rel="apple-touch-icon" href="/veyrnox-icon.svg" />
    <!-- Brand type: Schibsted Grotesk for prose/labels, IBM Plex Mono for every
         verifiable value (addresses, amounts, fees, chain IDs, hashes). The
         faces are self-hosted (woff2 under src/assets/fonts/, declared via
         @font-face in src/index.css) — no Google-Fonts CDN fetch at runtime,
         so first-screen text LCP gates on a local file and no font request
         leaves the device (I2). -->
    <!-- Content Security Policy (VULN-4 fix).
         connect-src lists every external origin the app legitimately calls:
           - min-api.cryptocompare.com  price data (demoClient / CryptoCompare)
           - mempool.space              BTC fee estimates + UTXO lookup
           - api.etherscan.io / sepolia.etherscan.io  gas oracle + tx lookup
           - *.solana.com               Solana RPC endpoints (devnet/testnet/mainnet)
           - solscan.io                 Solana explorer links (navigation only)
           - *.publicnode.com           EVM public RPC nodes (Ethereum/Polygon/Arb/…)
           - *.infura.io                optional user-configured Infura RPC
           - 'self'                     same-origin fetch (Vite HMR in dev, local APIs)
         Note: ensideas.com and bonfida.workers.dev are intentionally ABSENT —
         ENS now resolves on-chain (VULN-1 fix) and SNS is honest-disabled.
         script-src 'self': production bundle uses only external module scripts —
         no inline scripts exist in the built page, so 'unsafe-inline' is omitted.
         Dev HMR works because Vite's dev server bypasses the meta CSP. -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      font-src 'self';
      img-src 'self' data: https://images.unsplash.com;
      object-src 'none';
      base-uri 'self';
      connect-src 'self'
        https://min-api.cryptocompare.com
        https://mempool.space
        https://api.etherscan.io
        https://sepolia.etherscan.io
        https://api.devnet.solana.com
        https://api.testnet.solana.com
        https://api.mainnet-beta.solana.com
        https://*.publicnode.com
        https://*.infura.io;
    ">
    <title>Veyrnox</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
