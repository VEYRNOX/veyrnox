<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Content-Security-Policy (defense-in-depth vs XSS for a key-handling app).
         connect-src is the anti-exfiltration allowlist: ONLY the audited RPC /
         price hosts may be reached, so injected code cannot POST a seed or
         address to an arbitrary endpoint. (ENS resolves on-chain via the RPC
         nodes and SNS is honest-disabled, so no third-party name-service host
         is allowlisted — least privilege.)
         Notes for reviewers:
           • 'wasm-unsafe-eval' is REQUIRED — the vault KDF (Argon2id via hash-wasm)
             compiles WebAssembly; without it the wallet cannot encrypt/unlock.
           • img-src allows https: + data: because NFT/avatar art loads from
             arbitrary gateways; coin logos are local ('self').
           • style-src 'unsafe-inline' is needed by the UI libs' injected styles.
           • connect-src is pinned to explicit hostnames (no wildcards); see
             the full list in the meta tag below — 8 publicnode.com + 3 solana.com
             origins plus the other audited testnet/mainnet endpoints.
         Verified on the iOS Simulator (capacitor:// WKWebView): policy is
         enforced (inline-script / eval / off-allowlist exfil all blocked) and
         the Argon2id WASM KDF compiles, so vault create/unlock works under it
         (see scripts/csp-injection-probe.* and the csp-policy.test.js suite). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://ethereum-sepolia-rpc.publicnode.com https://polygon-bor-rpc.publicnode.com https://arbitrum-one-rpc.publicnode.com https://optimism-rpc.publicnode.com https://avalanche-fuji-c-chain-rpc.publicnode.com https://avalanche-c-chain-rpc.publicnode.com https://bsc-testnet-rpc.publicnode.com https://bsc-rpc.publicnode.com https://eth.llamarpc.com https://rpc-amoy.polygon.technology https://sepolia-rollup.arbitrum.io https://sepolia.optimism.io https://api.avax-test.network https://api.devnet.solana.com https://api.testnet.solana.com https://api.mainnet-beta.solana.com https://mempool.space https://min-api.cryptocompare.com https://api.etherscan.io; worker-src 'self' blob:; frame-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
    />
    <link rel="icon" type="image/svg+xml" href="/veyrnox-icon.svg" />
    <!-- viewport-fit=cover so safe-area-inset-* are non-zero (notch / home indicator).
         maximum-scale=1 + user-scalable=no lock the WKWebView scale: this is a native
         Capacitor app shell, not a scrollable web page, and an accidental pinch /
         double-tap otherwise zooms the content and pushes the right edge off-screen —
         on iOS that clipped the rightmost bottom-nav item ("More") and right-side UI.
         Native chrome doesn't pinch-zoom; the desktop preview never gets touch gestures,
         which is why the bug showed only on device. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#050608" />
    <link rel="apple-touch-icon" href="/veyrnox-icon.svg" />
    <!-- Brand type: Schibsted Grotesk for prose/labels, IBM Plex Mono for every
         verifiable value (addresses, amounts, fees, chain IDs, hashes). The
         faces are self-hosted (woff2 under src/assets/fonts/, declared via
         @font-face in src/index.css) — no Google-Fonts CDN fetch at runtime,
         so first-screen text LCP gates on a local file and no font request
         leaves the device (I2). -->
    <title>Veyrnox</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
