apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace = "com.veyrnox.app"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }
    defaultConfig {
        applicationId "com.veyrnox.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 6
        // Customer-facing version for the public Play launch. versionCode is internal
        // bookkeeping (monotonic, permanently consumed per upload, never shown to users);
        // versionName is what appears on the store listing. Launching as a clean "1.0".
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // RASP APK tamper detection — inject via -PRELEASE_CERT_SHA256=<hash>.
        // Blank = fail-closed (I4). Release builds validate format at task start.
        buildConfigField "String", "RELEASE_CERT_SHA256", "\"${project.findProperty('RELEASE_CERT_SHA256') ?: ''}\""
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // Resolution order: keystore.properties (local dev / release box), then
            // env vars (CI). The property NAMES must match the file that is actually
            // in use — android/keystore.properties ships KEYSTORE_PATH /
            // KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD, so those are read first,
            // with the camelCase spellings accepted as a fallback.
            //
            // The two spellings carry DIFFERENT path conventions, so each needs its own
            // resolution base — resolving both against rootProject silently pointed
            // `storeFile=../veyrnox-upload.jks` at the repo root instead of android/:
            //   KEYSTORE_PATH (ours, and the env var CI sets) -> relative to android/
            //   storeFile     (Android Studio's generated spelling) -> relative to android/app/
            def propsFile = rootProject.file("keystore.properties")
            def ksPath = System.getenv("KEYSTORE_PATH")
            def ksBase = rootProject
            def ksPass = System.getenv("KEYSTORE_PASSWORD")
            def ksAlias = System.getenv("KEY_ALIAS")
            def ksKeyPass = System.getenv("KEY_PASSWORD")

            if (propsFile.exists()) {
                def props = new Properties()
                propsFile.withInputStream { props.load(it) }
                if (props['KEYSTORE_PATH']) {
                    ksPath = props['KEYSTORE_PATH']
                } else if (props['storeFile']) {
                    ksPath = props['storeFile']
                    ksBase = project
                }
                ksPass    = props['KEYSTORE_PASSWORD'] ?: props['storePassword'] ?: ksPass
                ksAlias   = props['KEY_ALIAS']         ?: props['keyAlias']      ?: ksAlias
                ksKeyPass = props['KEY_PASSWORD']      ?: props['keyPassword']   ?: ksKeyPass
            }

            if (ksPath) {
                storeFile     ksBase.file(ksPath)
                storePassword ksPass
                keyAlias      ksAlias
                keyPassword   ksKeyPass
            }
        }
    }
    buildTypes {
        debug {
            applicationIdSuffix ".debug"
        }
        release {
            def propsFile = rootProject.file("keystore.properties")
            def hasSigningConfig = propsFile.exists() || System.getenv("KEYSTORE_PATH")
            signingConfig hasSigningConfig ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            // Remove unused resources (layouts, drawables, strings, etc.) from the
            // release APK. Reduces attack surface and APK size. Requires minifyEnabled
            // true (R8 drives the reachability analysis that shrinkResources depends on).
            shrinkResources true
            // Explicitly non-debuggable in release (defense-in-depth alongside the
            // MainActivity setWebContentsDebuggingEnabled(false) guard).
            debuggable false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    // Android's android.jar stubs org.json.* out for JVM unit tests (they throw
    // "not mocked" at runtime) — the real implementation must come from Maven for
    // PlayIntegrityNonceVerifierTest to parse test payloads. AndroidX/Android
    // Test framework doesn't pull org.json transitively for the JVM unit-test
    // classpath. Version pinned to a maintained release (Android SDK bundles
    // this same library at OS level; test-time we use the Maven artifact).
    testImplementation 'org.json:json:20240303'
    // BouncyCastle for JVM unit tests only — generates real P-256 key pairs and
    // self-signed X.509 certs in PlayIntegrityJwsVerifierTest without Robolectric.
    testImplementation 'org.bouncycastle:bcprov-jdk18on:1.78.1'
    testImplementation 'org.bouncycastle:bcpkix-jdk18on:1.78.1'
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation 'androidx.biometric:biometric:1.1.0'
    // Play Integrity API — RASP Phase 2b remote attestation (PlayIntegrityPlugin.kt).
    // Requests a signed integrity verdict token; the verdict is decoded on-device.
    implementation 'com.google.android.play:integrity:1.3.0'
    // OkHttp — required by CertPinManager.kt (G2 Android certificate pinning, PR #984).
    // OkHttpClient + CertificatePinner build a per-host pin set and reject any TLS
    // handshake whose leaf/intermediate SHA-256 spki hash doesn't match. Not shipped
    // with Capacitor by default; without this, :app:compileDebugKotlin fails with
    // "Unresolved reference 'okhttp3'" on the CertPinManager import.
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}

apply from: 'capacitor.build.gradle'

tasks.matching { it.name == 'bundleRelease' || it.name == 'assembleRelease' }.configureEach {
    doFirst {
        def cert = project.findProperty('RELEASE_CERT_SHA256') ?: ''
        if (cert.trim().isEmpty()) {
            throw new GradleException(
                'RELEASE_CERT_SHA256 is blank — the build would fail-closed (I4) on every device.\n' +
                'Pass -PRELEASE_CERT_SHA256="<Google app signing SHA-256>" on the command line.')
        }
        if (!cert.matches(/^([0-9A-Fa-f]{2}:){31}[0-9A-Fa-f]{2}$/)) {
            throw new GradleException(
                "RELEASE_CERT_SHA256 has an invalid format: ${cert}\n" +
                'Expected 32 colon-separated hex pairs (e.g. AA:BB:CC:...).')
        }

        // A well-formed fingerprint can still be the WRONG one. The two mistakes that
        // actually happen are passing the debug keystore's fingerprint (copied from a
        // local debug invocation) or the upload cert's (it's the key you just used to
        // sign, so it looks right). Either ships an AAB whose RASP check compares
        // against a cert Play-installed builds were never signed with — tampered:true
        // on every launch, fail-closed but dead. Both fingerprints are derivable from
        // keystores already on disk, so this is machine-independent — no hardcoding.
        def sha256Of = { java.io.File ksFile, String storePass, String alias ->
            if (ksFile == null || !ksFile.exists() || alias == null) return null
            try {
                // "JKS" (not getDefaultType()) — the JDK's JKS provider runs in
                // compatibility mode and reads PKCS12 stores too; the reverse is not true.
                def ks = java.security.KeyStore.getInstance('JKS')
                ksFile.withInputStream { ks.load(it, storePass == null ? null : storePass.toCharArray()) }
                def c = ks.getCertificate(alias)
                if (c == null) return null
                return java.security.MessageDigest.getInstance('SHA-256')
                    .digest(c.encoded)
                    .collect { String.format('%02X', it) }
                    .join(':')
            } catch (Exception ignored) {
                // Unreadable keystore is not this guard's business — the signing-config
                // checks below fail on that. Skip rather than block the build.
                return null
            }
        }
        def rel = android.signingConfigs.release
        def dbg = android.signingConfigs.debug
        def uploadSha = sha256Of(rel?.storeFile, rel?.storePassword, rel?.keyAlias)
        def debugSha = sha256Of(dbg?.storeFile, dbg?.storePassword, dbg?.keyAlias)
        if (uploadSha != null && cert.equalsIgnoreCase(uploadSha)) {
            throw new GradleException(
                "RELEASE_CERT_SHA256 is the UPLOAD cert (${uploadSha}).\n" +
                'With Play App Signing enabled, Play re-signs the AAB with Google\'s app ' +
                'signing key, so the installed APK never carries the upload cert. Use the ' +
                'SHA-256 from Play Console -> Setup -> App integrity -> App signing key.\n' +
                'If this app is NOT enrolled in Play App Signing, the upload key IS the ' +
                'signing key — remove this check deliberately rather than working around it.')
        }
        if (debugSha != null && cert.equalsIgnoreCase(debugSha)) {
            throw new GradleException(
                "RELEASE_CERT_SHA256 is the DEBUG keystore cert (${debugSha}).\n" +
                'That value is for local debug builds only. Release builds need the ' +
                'SHA-256 from Play Console -> Setup -> App integrity -> App signing key.')
        }

        // Signing must actually have resolved. buildTypes.release selects
        // signingConfigs.release as soon as keystore.properties EXISTS — so a file
        // present but with unreadable keys would otherwise reach the packaging step
        // with no storeFile and fail obscurely (or, historically, silently debug-sign).
        def sc = android.signingConfigs.release
        if (sc.storeFile == null) {
            throw new GradleException(
                'Release signing is not configured.\n' +
                'Expected android/keystore.properties with KEYSTORE_PATH / ' +
                'KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD, or the equivalent ' +
                'environment variables.')
        }
        if (!sc.storeFile.exists()) {
            throw new GradleException(
                "Keystore not found at: ${sc.storeFile}\n" +
                'KEYSTORE_PATH is resolved relative to android/; the Android Studio ' +
                'spelling `storeFile` is resolved relative to android/app/.')
        }
    }
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

