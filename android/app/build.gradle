apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace = "com.veyrnox.app"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }
    defaultConfig {
        applicationId "com.veyrnox.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 3
        versionName "1.0.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // RELEASE_CERT_SHA256: SHA-256 fingerprint of the release signing certificate for
        // RASP APK tamper detection (RaspIntegrityPlugin.detectTamper).
        // Inject via CI: -PRELEASE_CERT_SHA256=<real-hash>
        // If the property is absent, BuildConfig.RELEASE_CERT_SHA256 is an empty string.
        // RaspIntegrityPlugin.detectTamper() treats a blank value as tampered (fail-closed,
        // I4) — a misconfigured or unkeyed build must not be trusted.
        // Do NOT commit a real release fingerprint here.
        buildConfigField "String", "RELEASE_CERT_SHA256", "\"${project.findProperty('RELEASE_CERT_SHA256') ?: ''}\""
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // Populated from CI secrets (KEYSTORE_BASE64 decoded to keystore.jks).
            // Local dev: omit these env vars and Gradle falls back to debug signing.
            def ksPath = System.getenv("KEYSTORE_PATH")
            if (ksPath) {
                storeFile     file(ksPath)
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias      System.getenv("KEY_ALIAS")
                keyPassword   System.getenv("KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        debug {
            // Local device-verification builds install side-by-side with a
            // release-signed com.veyrnox.app (signatures differ, so in-place update
            // is impossible). The suffix keeps the existing app's data intact.
            // Only applicationId changes; `namespace` stays com.veyrnox.app so all
            // code packages (HardwareKekPlugin, RaspIntegrityPlugin) are unaffected.
            applicationIdSuffix ".debug"
        }
        release {
            def ksPath = System.getenv("KEYSTORE_PATH")
            signingConfig ksPath ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            // Remove unused resources (layouts, drawables, strings, etc.) from the
            // release APK. Reduces attack surface and APK size. Requires minifyEnabled
            // true (R8 drives the reachability analysis that shrinkResources depends on).
            shrinkResources true
            // Explicitly non-debuggable in release (defense-in-depth alongside the
            // MainActivity setWebContentsDebuggingEnabled(false) guard).
            debuggable false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    // Android's android.jar stubs org.json.* out for JVM unit tests (they throw
    // "not mocked" at runtime) — the real implementation must come from Maven for
    // PlayIntegrityNonceVerifierTest to parse test payloads. AndroidX/Android
    // Test framework doesn't pull org.json transitively for the JVM unit-test
    // classpath. Version pinned to a maintained release (Android SDK bundles
    // this same library at OS level; test-time we use the Maven artifact).
    testImplementation 'org.json:json:20240303'
    // BouncyCastle for JVM unit tests only — generates real P-256 key pairs and
    // self-signed X.509 certs in PlayIntegrityJwsVerifierTest without Robolectric.
    testImplementation 'org.bouncycastle:bcprov-jdk18on:1.78.1'
    testImplementation 'org.bouncycastle:bcpkix-jdk18on:1.78.1'
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation 'androidx.biometric:biometric:1.1.0'
    // Play Integrity API — RASP Phase 2b remote attestation (PlayIntegrityPlugin.kt).
    // Requests a signed integrity verdict token; the verdict is decoded on-device.
    implementation 'com.google.android.play:integrity:1.3.0'
    // OkHttp — required by CertPinManager.kt (G2 Android certificate pinning, PR #984).
    // OkHttpClient + CertificatePinner build a per-host pin set and reject any TLS
    // handshake whose leaf/intermediate SHA-256 spki hash doesn't match. Not shipped
    // with Capacitor by default; without this, :app:compileDebugKotlin fails with
    // "Unresolved reference 'okhttp3'" on the CertPinManager import.
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
