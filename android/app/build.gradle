apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace = "com.veyrnox.app"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    defaultConfig {
        applicationId "com.veyrnox.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // H-NEW-1 (TARGET — dev fingerprint only): release signing certificate SHA-256
        // fingerprint for RASP APK tamper detection (RaspIntegrityPlugin.detectTamper).
        // This is a PUBLIC certificate hash, not a secret. The fallback below is the
        // dev/debug signing cert for this repo — it does NOT represent a release identity.
        // PREREQUISITE before this control is functional on release builds:
        //   (1) add a release signingConfig (storeFile/keyAlias/passwords) to this file,
        //   (2) inject the matching fingerprint via CI: -PRELEASE_CERT_SHA256=<real-hash>.
        // Until both are configured, detectTamper() validates against the dev cert only
        // (catches re-signing by a third party, but NOT against a genuine release key).
        buildConfigField "String", "RELEASE_CERT_SHA256", "\"${project.findProperty('RELEASE_CERT_SHA256') ?: '2F:A3:38:63:AC:DD:30:F6:0F:27:84:8E:22:3E:3C:63:BE:82:0B:ED:82:94:8D:21:C4:A4:33:87:FF:4D:B1:70'}\""
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // Populated from CI secrets (KEYSTORE_BASE64 decoded to keystore.jks).
            // Local dev: omit these env vars and Gradle falls back to debug signing.
            def ksPath = System.getenv("KEYSTORE_PATH")
            if (ksPath) {
                storeFile     file(ksPath)
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias      System.getenv("KEY_ALIAS")
                keyPassword   System.getenv("KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        release {
            def ksPath = System.getenv("KEYSTORE_PATH")
            signingConfig ksPath ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            // Explicitly non-debuggable in release (defense-in-depth alongside the
            // MainActivity setWebContentsDebuggingEnabled(false) guard).
            debuggable false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation 'androidx.biometric:biometric:1.1.0'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
