<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Veyrnox — Feature Catalogue</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f3;
    --color-background-tertiary: #eeede9;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #6b6a65;
    --color-text-tertiary: #9b9a94;
    --color-border-tertiary: rgba(0,0,0,.12);
    --color-border-secondary: rgba(0,0,0,.22);
    --color-border-primary: rgba(0,0,0,.35);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --font-sans: system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1a;
      --color-background-secondary: #262623;
      --color-background-tertiary: #2e2e2b;
      --color-text-primary: #f0efe8;
      --color-text-secondary: #a8a79f;
      --color-text-tertiary: #72716b;
      --color-border-tertiary: rgba(255,255,255,.10);
      --color-border-secondary: rgba(255,255,255,.18);
      --color-border-primary: rgba(255,255,255,.28);
    }
  }
  body {
    font-family: var(--font-sans);
    background: var(--color-background-tertiary);
    color: var(--color-text-primary);
    padding: 2rem;
    min-height: 100vh;
  }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
  .vx-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .vx-stat { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 16px; }
  .vx-stat-label { font-size: 11px; color: var(--color-text-secondary); }
  .vx-stat-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .vx-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .vx-filter { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); font-size: 13px; cursor: pointer; transition: all .15s; font-family: var(--font-sans); }
  .vx-filter.active, .vx-filter:hover { background: var(--color-background-primary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
  .vx-search { flex: 1; min-width: 200px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; font-family: var(--font-sans); outline: none; }
  .vx-search:focus { border-color: var(--color-border-primary); }
  .vx-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
  .vx-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px; cursor: default; transition: border-color .15s; }
  .vx-card:hover { border-color: var(--color-border-secondary); }
  .vx-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 4px; }
  .vx-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.3; }
  .vx-note { font-size: 11px; color: var(--color-text-tertiary); }
  .vx-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-live { background: #E1F5EE; color: #0F6E56; }
  .badge-built { background: #E6F1FB; color: #185FA5; }
  .badge-target { background: #FAEEDA; color: #854F0B; }
  .badge-planned { background: #F1EFE8; color: #5F5E5A; }
  .vx-section { margin-bottom: 1.75rem; }
  .vx-section-title { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .vx-empty { color: var(--color-text-tertiary); font-size: 13px; padding: 2rem 0; text-align: center; }
</style>
</head>
<body>

  <button class="vx-filter" data-filter="live">Live</button>
  <button class="vx-filter" data-filter="built">Built</button>
  <button class="vx-filter" data-filter="target">Target</button>

<div id="output"></div>

const BADGE = { live: "Live", built: "Built", target: "Target", planned: "Planned" };
const BADGE_CLS = { live: "badge-live", built: "badge-built", target: "badge-target", planned: "badge-planned" };

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const f = document.querySelector('.vx-filter.active').dataset.filter;
  const filtered = FEATURES.filter(x =>
    (f === 'all' || x.status === f) &&
    (!q || x.name.toLowerCase().includes(q) || x.cat.toLowerCase().includes(q) || (x.note && x.note.toLowerCase().includes(q)))
  );
  const groups = {};
  filtered.forEach(x => { (groups[x.cat] = groups[x.cat] || []).push(x); });
  const out = document.getElementById('output');
  if (!filtered.length) { out.innerHTML = '<p class="vx-empty">No features match.</p>'; return; }
  out.innerHTML = Object.keys(groups).map(cat => `
    <div class="vx-section">
      <div class="vx-section-title">${cat}</div>
      <div class="vx-grid">
        ${groups[cat].map(x => `
          <div class="vx-card">
            <div class="vx-card-top">
              <span class="vx-name">${x.name}</span>
              <span class="vx-badge ${BADGE_CLS[x.status]}">${BADGE[x.status]}</span>
            </div>
            ${x.note ? `<div class="vx-note">${x.note}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  const counts = {};
  FEATURES.forEach(x => { counts[x.status] = (counts[x.status] || 0) + 1; });
  document.getElementById('stats').innerHTML = [
    { l: 'Total', v: FEATURES.length },
    { l: 'Live', v: counts.live || 0 },
    { l: 'Built', v: counts.built || 0 },
    { l: 'Planned', v: (counts.planned || 0) + (counts.target || 0) },
  ].map(s => `<div class="vx-stat"><div class="vx-stat-label">${s.l}</div><div class="vx-stat-val">${s.v}</div></div>`).join('');
}

document.querySelectorAll('.vx-filter').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.vx-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}));
document.getElementById('search').addEventListener('input', render);
render();
</script>
</body>
</html>
